<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Localhost Chatbot</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Localhost Chatbot</h1>
        <div class="status">
          <span id="connDot" class="dot" aria-hidden="true"></span>
          <span id="connText">disconnected</span>
        </div>
      </header>

      <section class="card">
        <div class="row">
          <label class="field">
            <span>Username</span>
            <input
              id="username"
              autocomplete="username"
              placeholder="e.g. Alice"
            />
          </label>

          <button id="startBtn" class="btn">Start</button>
        </div>
      </section>

      <section class="card chat">
        <div id="messages" class="messages" aria-live="polite"></div>

        <div class="upload">
          <input id="imageFile" type="file" accept="image/*" />
          <button id="uploadBtn" class="btn" type="button">Upload image</button>
        </div>
        <div id="uploadInfo" class="meta" aria-live="polite"></div>
        <div id="uploadPreview" class="previews" hidden>
          <img id="uploadedImage" alt="Uploaded image preview" />
        </div>

        <form id="sendForm" class="send">
          <input
            id="message"
            placeholder="Type a message…"
            autocomplete="off"
          />
          <button class="btn" type="submit">Send</button>
        </form>
      </section>

      <footer class="footer">
        <small>
          Tip: open from your phone using your PC IP (same Wi‑Fi).
        </small>
      </footer>
    </main>

    <script
      src="https://cdn.socket.io/4.8.3/socket.io.min.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
